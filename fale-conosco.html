<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgroBoost | Fale Conosco</title>
    <link rel="icon" type="image/svg+xml" href="img/logo.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              agro: {
                light: "#e8f5e9",
                DEFAULT: "#4caf50",
                dark: "#2e7d32",
                accent: "#fbc02d",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
    <!-- HEADER -->
    <header class="bg-agro-dark text-white shadow-md sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-4 py-4">
        <div class="flex justify-between items-center">
          <!-- LOGO -->
          <div class="flex items-center gap-3">
            <i class="fa-solid fa-leaf text-agro-accent text-2xl"></i>

            <div>
              <h1 class="font-bold text-xl sm:text-2xl">AgroBoost</h1>

              <p class="text-[10px] sm:text-xs text-agro-light">
                Consultor Agrícola Digital
              </p>
            </div>
          </div>

          <!-- BOTÃO MOBILE -->
          <button id="menu-btn" class="md:hidden text-2xl text-white">
            <i class="fa-solid fa-bars"></i>
          </button>

          <!-- MENU DESKTOP -->
          <nav class="hidden md:flex gap-6 text-sm font-medium">
            <a href="index.html" class="hover:text-agro-accent transition">
              Home
            </a>

            <a href="sistema.html" class="hover:text-agro-accent transition">
              Sistema
            </a>

            <a
              href="fale-conosco.html"
              class="hover:text-agro-accent transition"
            >
              Fale Conosco
            </a>
          </nav>
        </div>

        <!-- MENU MOBILE -->
        <nav
          id="mobile-menu"
          class="hidden flex items-center justify-around gap-3 mt-4 md:hidden text-sm border-t border-white/20 pt-4"
        >
          <a href="index.html" class="hover:text-agro-accent"> Home </a>

          <a href="sistema.html" class="hover:text-agro-accent"> Sistema </a>

          <a href="fale-conosco.html" class="hover:text-agro-accent">
            Fale Conosco
          </a>
        </nav>
      </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto px-4 py-16 w-full">
      <div class="text-center mb-10">
        <h2 class="text-4xl font-black text-agro-dark">Fale Conosco</h2>
        <p class="text-gray-600 mt-3">
          Entre em contato com a equipe AgroBoost.
        </p>
      </div>
      <form
        class="bg-white rounded-2xl shadow-lg p-8 grid md:grid-cols-2 gap-6"
      >
        <div>
          <label class="font-semibold text-sm">Nome Completo</label
          ><input
            type="text"
            required
            minlength="3"
            class="w-full mt-2 border rounded-lg px-4 py-3"
            placeholder="Seu nome"
          />
        </div>
        <div>
          <label class="font-semibold text-sm">E-mail</label
          ><input
            type="email"
            required
            class="w-full mt-2 border rounded-lg px-4 py-3"
            placeholder="email@exemplo.com"
          />
        </div>
        <div>
          <label class="font-semibold text-sm">Telefone</label
          ><input
            type="tel"
            required
            pattern="[0-9()\-\s+]{10,}"
            class="w-full mt-2 border rounded-lg px-4 py-3"
            placeholder="(11) 99999-9999"
          />
        </div>
        <div>
          <label class="font-semibold text-sm">Cidade</label
          ><input
            type="text"
            required
            class="w-full mt-2 border rounded-lg px-4 py-3"
            placeholder="Sua cidade"
          />
        </div>
        <div class="md:col-span-2">
          <label class="font-semibold text-sm">Assunto</label
          ><input
            type="text"
            required
            minlength="5"
            class="w-full mt-2 border rounded-lg px-4 py-3"
            placeholder="Assunto da mensagem"
          />
        </div>
        <div class="md:col-span-2">
          <label class="font-semibold text-sm">Mensagem</label
          ><textarea
            required
            minlength="10"
            rows="5"
            class="w-full mt-2 border rounded-lg px-4 py-3"
            placeholder="Digite sua mensagem"
          ></textarea>
        </div>
        <div class="md:col-span-2 flex items-start gap-2">
          <input type="checkbox" required class="mt-1" /><span class="text-sm"
            >Autorizo contato da equipe AgroBoost.</span
          >
        </div>
        <div class="md:col-span-2">
          <button
            class="w-full bg-agro hover:bg-agro-dark text-white font-bold py-4 rounded-lg"
          >
            Enviar Mensagem
          </button>
        </div>
      </form>
    </main>
    <footer class="bg-gray-800 text-gray-400 text-center py-6 text-sm">
      <p>AgroBoost © 2026 - FIAP Engenharia de Software</p>
    </footer>

    <!-- Lógica JavaScript -->
    <script src="script-header.js"></script>
  </body>
</html>
