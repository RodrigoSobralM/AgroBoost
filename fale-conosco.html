<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgroBoost | Fale Conosco</title>
    <link rel="icon" type="image/svg+xml" href="img/logo.svg" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body class="page-body">
    <header class="site-header">
      <div class="container header-inner">
        <div class="header-row">
          <div class="brand">
            <i class="fa-solid fa-leaf brand-icon"></i>

            <div>
              <h1 class="brand-title">AgroBoost</h1>
              <p class="brand-subtitle">Consultor Agrícola Digital</p>
            </div>
          </div>

          <button id="menu-btn" class="menu-toggle" type="button">
            <i class="fa-solid fa-bars"></i>
          </button>

          <nav class="desktop-nav">
            <a href="index.html">Home</a>
            <a href="sistema.html">Sistema</a>
            <a href="fale-conosco.html">Fale Conosco</a>
          </nav>
        </div>

        <nav id="mobile-menu" class="mobile-nav hidden">
          <a href="index.html">Home</a>
          <a href="sistema.html">Sistema</a>
          <a href="fale-conosco.html">Fale Conosco</a>
        </nav>
      </div>
    </header>

    <main class="contact-main">
      <div class="page-heading">
        <h2 class="page-title">Fale Conosco</h2>
        <p class="page-description">Entre em contato com a equipe AgroBoost.</p>
      </div>

      <form class="contact-form">
        <div class="form-group">
          <label for="name">Nome Completo</label>
          <input
            id="name"
            class="field"
            type="text"
            required
            minlength="3"
            placeholder="Seu nome"
          />
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            id="email"
            class="field"
            type="email"
            required
            placeholder="email@exemplo.com"
          />
        </div>

        <div class="form-group">
          <label for="phone">Telefone</label>
          <input
            id="phone"
            class="field"
            type="tel"
            required
            pattern="[0-9()\-\s+]{10,}"
            inputmode="tel"
            maxlength="15"
            placeholder="(11) 99999-9999"
          />
        </div>

        <div class="form-group">
          <label for="city">Cidade</label>
          <input
            id="city"
            class="field"
            type="text"
            required
            placeholder="Sua cidade"
          />
        </div>

        <div class="form-group span-full">
          <label for="subject">Assunto</label>
          <input
            id="subject"
            class="field"
            type="text"
            required
            minlength="5"
            placeholder="Assunto da mensagem"
          />
        </div>

        <div class="form-group span-full">
          <label for="message">Mensagem</label>
          <textarea
            id="message"
            class="field"
            required
            minlength="10"
            rows="5"
            placeholder="Digite sua mensagem"
          ></textarea>
        </div>

        <label class="checkbox-line span-full">
          <input type="checkbox" required />
          <span>Autorizo contato da equipe AgroBoost.</span>
        </label>

        <div class="span-full">
          <button class="btn submit-button" type="submit">Enviar Mensagem</button>
        </div>
      </form>
    </main>

    <footer class="site-footer">
      <p>AgroBoost © 2026 - FIAP Engenharia de Software</p>
    </footer>

    <script src="script-contato.js"></script>
    <script src="script-header.js"></script>
  </body>
</html>
